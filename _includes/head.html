<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  {% seo %}
  
  <!-- Canonical URL -->
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ '/css/main.css' | relative_url }}">
  
  <link rel="preload" href="{{ '/assets/fonts/xcharter/XCharter-Roman.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ '/assets/fonts/inter/inter-latin-400-normal.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>

  {% include custom-fonts.html %}
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}">
  
  <!-- RSS Feed -->
  {% feed_meta %}
  
  <!-- Security headers -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    img-src 'self' https: data: http://cdn.viglink.com;
    media-src 'self' https: data: blob:;
    style-src 'self' 'unsafe-inline';
    font-src 'self';
    script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://mc.yandex.ru https://yastatic.net;
    connect-src 'self' https: https://www.google-analytics.com https://stats.g.doubleclick.net https://mc.yandex.ru wss://mc.yandex.ru;
    worker-src 'self' blob:;
    frame-src https://www.youtube.com https://www.youtube-nocookie.com https://mc.yandex.ru https://metrika.yandex.ru;
    frame-ancestors 'self' https://metrika.yandex.ru https://*.metrika.yandex.ru https://webvisor.com;
  ">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-XSS-Protection" content="1; mode=block">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  
  <!-- Theme color -->
  <meta name="theme-color" content="#FFFFFF">
  <meta name="msapplication-TileColor" content="#FFFFFF">
  
  <!-- Structured data for travel blog -->
  {% if page.layout == 'post' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "TravelAction",
    "name": "{{ page.title }}",
    "description": "{{ page.description | default: page.excerpt | strip_html | truncate: 160 }}",
    "url": "{{ page.url | absolute_url }}",
    "author": {
      "@type": "Person",
      "name": "{{ site.author.name }}"
    },
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "image": "{% if page.image %}{{ page.image }}{% elsif page.preview %}{{ page | preview_absolute_url }}{% else %}{{ site.logo | absolute_url }}{% endif %}"
  }
  </script>
  {% endif %}

  {% if site.enable_analytics or jekyll.environment == 'production' %}
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WHKSXKWSEQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-WHKSXKWSEQ');
  </script>
  {% endif %}

  {% include yandex-metrika.html %}
</head>
